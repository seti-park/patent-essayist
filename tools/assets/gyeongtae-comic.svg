<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 1040">
  <!-- Gyeongtae, comic edition: chibi proportions, cel shading, amber eyes,
       blush, lens highlights, manga hatching. Same rig anchors as the flat
       edition: feet bottom ~926, pointer tip ~(24,336). -->
  <g stroke="#222933" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">

    <!-- tail: curled up, ringed -->
    <path d="M 380 700 C 500 700 560 640 552 540 C 548 480 502 466 492 516
             C 486 552 516 570 488 610 C 462 646 416 660 372 656 Z"
          fill="#8C7B6B"/>
    <path d="M 380 700 C 470 698 520 672 540 622 C 534 668 488 700 430 706 Z"
          fill="#7A6A5B" stroke="none"/>
    <path d="M 549 559 L 504 549" stroke="#6E5F52" stroke-width="14" fill="none"/>
    <path d="M 541 597 L 498 583" stroke="#6E5F52" stroke-width="14" fill="none"/>

    <!-- trousers -->
    <path d="M 240 640 L 380 640 L 374 878 L 318 878 L 310 706 L 302 878 L 246 878 Z"
          fill="#39414E"/>
    <path d="M 340 640 L 380 640 L 374 878 L 340 878 Z" fill="#2E3542" stroke="none"/>
    <path d="M 240 640 L 380 640 L 374 878 L 318 878 L 310 706 L 302 878 L 246 878 Z"
          fill="none"/>
    <!-- feet -->
    <ellipse cx="278" cy="896" rx="54" ry="30" fill="#FFFFFF"/>
    <ellipse cx="350" cy="896" rx="54" ry="30" fill="#FFFFFF"/>
    <path d="M 262 906 L 262 922 M 286 908 L 286 924" stroke-width="6" fill="none"/>
    <path d="M 334 908 L 334 924 M 358 906 L 358 922" stroke-width="6" fill="none"/>

    <!-- pointer arm (viewer left), raised -->
    <path d="M 236 440 C 188 458 154 446 132 412 L 166 370 C 192 396 216 402 242 396 Z"
