    <line x1="234" y1="626" x2="386" y2="626" stroke-width="6"/>
    <path d="M 272 406 L 310 450 L 348 406 L 330 392 L 290 392 Z" fill="#FFFFFF"/>

    <!-- scroll arm (viewer right) -->
    <path d="M 370 440 C 406 458 422 498 426 562 L 390 590 C 382 522 370 496 350 478 Z"
