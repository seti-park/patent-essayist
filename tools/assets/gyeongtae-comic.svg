    <path d="M 296 484 L 310 560 L 306 566 L 294 492 Z" fill="#A03226" stroke="none"/>
    <path d="M 290 442 L 330 442 L 322 470 L 298 470 Z" fill="#BF3B2B"/>
    <path d="M 248 408 L 278 408 L 310 504 L 342 408 L 372 408
