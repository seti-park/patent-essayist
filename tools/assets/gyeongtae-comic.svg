    <path d="M 338 240 L 358 220 M 348 252 L 376 224" stroke="#FFFFFF"
          stroke-width="8" fill="none" opacity="0.85"/>

    <!-- nose + open smile -->
    <path d="M 300 330 L 320 330 L 310 344 Z" fill="#D98E80" stroke-width="6"/>
    <path d="M 286 352 C 296 372 324 372 334 352 C 326 384 294 384 286 352 Z"
          fill="#A04A40" stroke-width="7"/>
    <path d="M 298 366 C 306 372 314 372 322 366 C 318 376 302 376 298 366 Z"
          fill="#E8867A" stroke="none"/>

    <!-- whiskers -->
    <g stroke-width="6">
      <line x1="142" y1="304" x2="78"  y2="292"/>
      <line x1="144" y1="328" x2="82"  y2="330"/>
      <line x1="142" y1="350" x2="86"  y2="362"/>
      <line x1="478" y1="304" x2="542" y2="292"/>
      <line x1="476" y1="328" x2="538" y2="330"/>
      <line x1="478" y1="350" x2="534" y2="362"/>
    </g>
  </g>
</svg>
