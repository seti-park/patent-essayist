    <line x1="146" y1="386" x2="28" y2="338" stroke="#6E5F52" stroke-width="11"/>
    <circle cx="24" cy="336" r="12" fill="#BF3B2B" stroke="none"/>
    <circle cx="148" cy="388" r="27" fill="#FFFFFF"/>
    <path d="M 138 380 L 158 396 M 148 374 L 162 388" stroke-width="6" fill="none"/>

    <!-- torso: shirt + tie + vest -->
    <path d="M 252 408 L 368 408 L 390 440 L 390 648 L 230 648 L 230 440 Z"
