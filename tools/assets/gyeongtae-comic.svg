    <g transform="rotate(8 445 600)">
      <rect x="390" y="574" width="102" height="56" rx="25" fill="#FFFFFF"/>
      <rect x="390" y="600" width="102" height="30" rx="14" fill="#EDE6D6" stroke="none"/>
      <rect x="426" y="574" width="30" height="56" fill="#BF3B2B" stroke-width="6"/>
      <ellipse cx="492" cy="601" rx="13" ry="26" fill="#F0E8DA"/>
    </g>
    <circle cx="406" cy="580" r="23" fill="#FFFFFF"/>

    <!-- head: chibi -->
    <path d="M 138 262 C 138 158 212 92 310 92 C 408 92 482 158 482 262
