    <!-- tabby cap, scalloped -->
    <path d="M 182 172 C 214 120 258 98 310 98 C 362 98 406 120 438 172
             C 420 184 404 178 388 188 C 372 198 356 190 340 198
             C 330 202 290 202 280 198 C 264 190 248 198 232 188
             C 216 178 200 184 182 172 Z"
          fill="#8C7B6B"/>
    <path d="M 280 104 L 288 174" stroke="#6E5F52" stroke-width="14" fill="none"/>
    <path d="M 310 98 L 310 180" stroke="#6E5F52" stroke-width="14" fill="none"/>
    <path d="M 340 104 L 332 174" stroke="#6E5F52" stroke-width="14" fill="none"/>

    <!-- blush -->
    <ellipse cx="182" cy="334" rx="26" ry="14" fill="#F2B8AC" stroke="none"/>
    <ellipse cx="438" cy="334" rx="26" ry="14" fill="#F2B8AC" stroke="none"/>

    <!-- glasses -->
    <circle cx="244" cy="274" r="64" fill="#FFFFFF" fill-opacity="0.35" stroke-width="11"/>
    <circle cx="376" cy="274" r="64" fill="#FFFFFF" fill-opacity="0.35" stroke-width="11"/>
    <path d="M 306 266 C 308 252 312 252 314 266" fill="none" stroke-width="11"/>
    <line x1="181" y1="262" x2="146" y2="252" stroke-width="11"/>
    <line x1="439" y1="262" x2="474" y2="252" stroke-width="11"/>

    <!-- eyes: big, amber -->
    <g stroke="none">
      <circle cx="244" cy="278" r="30" fill="#FFFFFF"/>
      <circle cx="376" cy="278" r="30" fill="#FFFFFF"/>
      <circle cx="244" cy="280" r="20" fill="#C98A2B"/>
      <circle cx="376" cy="280" r="20" fill="#C98A2B"/>
      <circle cx="244" cy="282" r="10" fill="#222933"/>
      <circle cx="376" cy="282" r="10" fill="#222933"/>
      <circle cx="237" cy="270" r="6" fill="#FFFFFF"/>
      <circle cx="369" cy="270" r="6" fill="#FFFFFF"/>
      <circle cx="250" cy="290" r="3" fill="#FFF3DA"/>
      <circle cx="382" cy="290" r="3" fill="#FFF3DA"/>
