    <!-- ears -->
    <path d="M 184 150 C 162 96 154 60 162 32 C 198 42 234 68 256 100 Z" fill="#8C7B6B"/>
    <path d="M 436 150 C 458 96 466 60 458 32 C 422 42 386 68 364 100 Z" fill="#8C7B6B"/>
    <path d="M 194 118 C 184 90 180 70 184 54 C 204 64 222 80 234 100 Z"
